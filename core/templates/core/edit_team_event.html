{% extends 'core/base.html' %}
{% block title %}Edit Team Event - Fusion{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="mb-8">
        <a href="{% url 'event_list' %}" class="text-blue-600 hover:underline">← Back to Events</a>
        <h1 class="text-3xl font-bold mt-4">Edit Team Event</h1>
        <p class="text-gray-600">Update the details for this team event</p>
    </div>

    <div class="bg-white rounded-2xl border border-zinc-200 p-6">
        <form method="POST">
            {% csrf_token %}

            <!-- Event Name -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Event Name</label>
                <input type="text" name="name" value="{{ event.name|default:'' }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Team Selection -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Team</label>
                <select name="team" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    {% for team in teams %}
                    <option value="{{ team.id }}" 
                            {% if team.id == event.team.id %}selected{% endif %}>
                        {{ team.name }} ({{ team.get_sport_type_display|default:'' }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Start Time -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Start Time</label>
                <input type="datetime-local" name="start_time" id="start_time"
                       value="{{ event.start_time|date:'Y-m-d\TH:i' }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- End Time -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">End Time</label>
                <input type="datetime-local" name="end_time" id="end_time"
                       value="{{ event.end_time|date:'Y-m-d\TH:i' }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-500 mt-1">End time auto-adjusts 1 hour after start (same date)</p>
            </div>

            <!-- Location -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                <input type="text" name="location" value="{{ event.location|default:'' }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Description -->
            <div class="mb-8">
                <label class="block text-sm font-medium text-gray-700 mb-2">Description (Optional)</label>
                <textarea name="description" rows="4"
                          class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">{{ event.description|default:'' }}</textarea>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition">
                Update Team Event
            </button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const startInput = document.getElementById('start_time');
    const endInput = document.getElementById('end_time');

    if (!startInput || !endInput) return;

    function setEndTimeToOneHourLater() {
        const val = startInput.value;
        if (!val) return;

        const [datePart, timePart] = val.split('T');
        if (!timePart) return;

        let [hour, minute] = timePart.split(':').map(Number);
        let newHour = hour + 1;
        let newDatePart = datePart;

        if (newHour >= 24) {
            newHour -= 24;
            const [y, m, d] = datePart.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            dt.setDate(dt.getDate() + 1);
            const ny = dt.getFullYear();
            const nm = String(dt.getMonth() + 1).padStart(2, '0');
            const nd = String(dt.getDate()).padStart(2, '0');
            newDatePart = `${ny}-${nm}-${nd}`;
        }

        const newTime = String(newHour).padStart(2, '0') + ':' + String(minute).padStart(2, '0');
        endInput.value = newDatePart + 'T' + newTime;
    }

    startInput.addEventListener('change', setEndTimeToOneHourLater);
    startInput.addEventListener('input', setEndTimeToOneHourLater);

    if (startInput.value) {
        setEndTimeToOneHourLater();
    }
});
</script>
{% endblock %}
