{% extends 'core/base.html' %}
{% block title %}Edit Kid - Fusion{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-8 px-6">
    <div class="bg-white rounded-3xl border border-zinc-200 p-6">
        <h1 class="text-2xl font-bold tracking-tight text-center mb-6 text-zinc-900">Edit Kid</h1>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                <input type="text" name="first_name" value="{{ kid.first_name }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                <input type="text" name="last_name" value="{{ kid.last_name }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Date of Birth</label>
                <input type="date" name="date_of_birth" value="{{ kid.date_of_birth|date:'Y-m-d' }}" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Gender</label>
                <select name="gender" required id="gender" class="w-full px-4 py-3 pr-10 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-white" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3E%3Cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3E%3C/svg%27'); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.25em;">
                    <option value="M" {% if kid.gender == 'M' %}selected{% endif %}>Male</option>
                    <option value="F" {% if kid.gender == 'F' %}selected{% endif %}>Female</option>
                </select>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-2xl transition">
                Save Changes
            </button>
        </form>

        <a href="{% url 'my_family' %}" class="block text-center text-gray-500 mt-6 hover:text-gray-700">
            ← Back to My Family
        </a>
    </div>
</div>
{% endblock %}
