{% extends 'core/base.html' %}
{% block title %}Edit Kid - Fusion{% endblock %}

{% block content %}
<div class="min-w-0 overflow-x-hidden pb-4">

    <section class="relative left-1/2 -translate-x-1/2 w-screen max-w-[100vw] bg-gradient-to-b from-gray-100/55 via-gray-50/45 to-gray-100/40 pt-3 pb-3 sm:pt-4 sm:pb-4 border-y border-gray-200/35 shadow-[inset_0_1px_6px_rgba(0,0,0,0.02)]">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <div class="text-sm font-semibold tracking-[2px] text-gray-500 uppercase">Edit Kid</div>
            <p class="text-xs text-gray-500 mt-1">{{ kid.first_name }} {{ kid.last_name }}</p>
            <a href="{% url 'my_family' %}" class="inline-block mt-3 text-xs font-medium text-blue-600 hover:text-blue-700">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to My Family
            </a>
        </div>
    </section>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 mt-4">
        <div class="panel-card-dof rounded-2xl p-5 sm:p-6">
            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-1.5">First Name</label>
                    <input type="text" name="first_name" value="{{ kid.first_name }}" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-300">
                </div>

                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-1.5">Last Name</label>
                    <input type="text" name="last_name" value="{{ kid.last_name }}" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-300">
                </div>

                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-1.5">Date of Birth</label>
                    <input type="date" name="date_of_birth" value="{{ kid.date_of_birth|date:'Y-m-d' }}" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-300">
                </div>

                <div>
                    <label class="block text-[10px] font-semibold uppercase tracking-wider text-gray-400 mb-1.5">Gender</label>
                    <select name="gender" required id="gender"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/10 focus:border-gray-300 appearance-none"
                            style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 fill=%27none%27 viewBox=%270 0 20 20%27%3E%3Cpath stroke=%27%236b7280%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 stroke-width=%271.5%27 d=%27M6 8l4 4 4-4%27/%3E%3C/svg%27'); background-position: right 0.75rem center; background-repeat: no-repeat; background-size: 1.25em;">
                        <option value="M" {% if kid.gender == 'M' %}selected{% endif %}>Male</option>
                        <option value="F" {% if kid.gender == 'F' %}selected{% endif %}>Female</option>
                    </select>
                </div>

                <button type="submit"
                        class="w-full bg-gray-900 hover:bg-gray-800 text-white font-semibold py-3.5 rounded-xl text-sm transition-colors">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
