<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fusion{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-2xl font-bold text-blue-600">Fusion</a>
            <div class="flex gap-8 text-gray-600 font-medium">
                <a href="{% url 'dashboard' %}" class="hover:text-blue-600">Dashboard</a>
                <a href="{% url 'kid_list' %}" class="hover:text-blue-600">Kids</a>
                <a href="{% url 'event_list' %}" class="hover:text-blue-600">Events</a>
                <a href="{% url 'family_list' %}" class="hover:text-blue-600">Family</a>
                <a href="{% url 'account_settings' %}" class="hover:text-blue-600 font-semibold">Settings</a>
            </div>
            <a href="{% url 'logout' %}" class="text-red-600 hover:text-red-700 font-medium">Logout</a>
        </div>
    </nav>

    <!-- Messages (Success, Error, etc.) -->
    {% if messages %}
    <div class="max-w-6xl mx-auto px-6 py-4">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-2xl mb-4 text-sm font-medium
            {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200{% endif %}
            {% if message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% endif %}
            {% if message.tags == 'warning' %}bg-yellow-100 text-yellow-800 border border-yellow-200{% endif %}
            {% if message.tags == 'info' %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
