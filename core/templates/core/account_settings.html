{% extends 'core/base.html' %}
{% block title %}Settings - Fusion{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold mb-8">Account Settings</h1>

    <div class="bg-white rounded-3xl shadow p-8 space-y-10">
        
        <!-- Profile Information -->
        <div>
            <h2 class="text-xl font-semibold mb-4">Profile Information</h2>
            <form method="POST">
                {% csrf_token %}
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" name="first_name" value="{{ user.first_name|default:'' }}" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" name="last_name" value="{{ user.last_name|default:'' }}" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" value="{{ user.email|default:'' }}" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button type="submit" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-semibold">
                    Save Changes
                </button>
            </form>
        </div>

        <hr class="my-10">

        <!-- Change Password -->
        <div>
            <h3 class="font-semibold mb-3">Security</h3>
            <a href="{% url 'change_password' %}" 
               class="inline-flex items-center text-blue-600 hover:text-blue-700 font-medium">
                Change Password →
            </a>
        </div>

        <!-- Account Info -->
        <div class="text-sm text-gray-500">
            <p>Username: <span class="font-medium text-gray-700">{{ user.username }}</span></p>
            <p>Member since: {{ user.date_joined|date:"F j, Y" }}</p>
        </div>
    </div>
</div>
{% endblock %}
