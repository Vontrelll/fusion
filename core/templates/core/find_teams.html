{% extends 'core/base.html' %}
{% block title %}Find Teams - Fusion{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold text-center mb-8">Find Teams</h1>

    <!-- Search Bar -->
    <form method="GET" class="mb-10">
        <div class="relative max-w-2xl mx-auto">
            <input type="text" 
                   name="q" 
                   value="{{ query }}"
                   placeholder="Search by team name..."
                   class="w-full px-6 py-4 border border-gray-300 rounded-3xl text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit"
                    class="absolute right-4 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-medium">
                Search
            </button>
        </div>
    </form>

    <!-- Results - Always show -->
    <div class="space-y-4">
        {% for team in teams %}
        <div class="bg-white rounded-3xl shadow p-6 flex justify-between items-center">
            <div>
                <h3 class="text-xl font-semibold">{{ team.name }}</h3>
                <p class="text-gray-500">{{ team.get_sport_type_display|default:"Unknown Sport" }}</p>
            </div>
            <a href="{% url 'team_invite' team.id %}" 
               class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-medium">
                Request to Join
            </a>
        </div>
        {% empty %}
        <div class="text-center py-20 text-gray-500">
            <p class="text-xl">No teams found.</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
