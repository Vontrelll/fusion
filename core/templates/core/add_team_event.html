{% extends 'core/base.html' %}
{% block title %}Create Team Event - Fusion{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-8">
    <div class="mb-8">
        <a href="{% url 'owner_dashboard' %}" class="text-blue-600 hover:underline">← Back to Dashboard</a>
        <h1 class="text-3xl font-bold mt-4">Create Team Event</h1>
        <p class="text-gray-600">Create an event visible to all members of the selected team</p>
    </div>

    <div class="bg-white rounded-3xl shadow p-8">
        <form method="POST">
            {% csrf_token %}

            <!-- Event Name -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Event Name</label>
                <input type="text" name="name" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g. Practice Session">
            </div>

            <!-- Team Selection -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Team</label>
                <select name="team" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Select a team...</option>
                    {% for team in teams %}
                    <option value="{{ team.id }}">{{ team.name }} ({{ team.get_sport_type_display }})</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Date & Time -->
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Start Time</label>
                    <input type="datetime-local" name="start_time" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">End Time</label>
                    <input type="datetime-local" name="end_time" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Location -->
            <div class="mb-8">
                <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                <input type="text" name="location" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="e.g. Central Park Field #3">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition">
                Create Team Event
            </button>
        </form>
    </div>
</div>
{% endblock %}
