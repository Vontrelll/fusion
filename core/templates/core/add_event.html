<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f0f2f5;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="bg-white w-full max-w-md mx-auto rounded-2xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-[#1877f2] text-white p-4 text-center">
            <h1 class="text-2xl font-semibold">Add New Event</h1>
        </div>

        <div class="p-6">
            <form method="POST">
                {% csrf_token %}

                <div class="space-y-5">
                    <!-- Event Name -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Event Name</label>
                        <input type="text" name="name" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg
                                focus:outline-none focus:border-[#1877f2] focus:ring-2 focus:ring-[#1877f2]/30">
                    </div>

                    <!-- Start Time -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Start Time</label>
                        <input type="datetime-local" name="start_time" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <!-- End Time -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">End Time</label>
                        <input type="datetime-local" name="end_time" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <!-- Location -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Location</label>
                        <input type="text" name="location"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <!-- Select Kid -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">For which kid?</label>
                        <select name="kid" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                            <option value="">-- Choose Kid --</option>
                            {% for kid in kids %}
                                <option value="{{ kid.id }}">{{ kid.first_name }} {{ kid.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                            class="w-full bg-[#1877f2] hover:bg-[#166fe5] text-white font-semibold py-3.5 rounded-lg transition duration-200 text-lg">
                        Add Event
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
