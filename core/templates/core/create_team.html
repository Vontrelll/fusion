{% extends 'core/base.html' %}
{% block title %}Create New Team - Fusion{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-12">
    <div class="bg-white rounded-3xl shadow-xl p-10">
        <h1 class="text-3xl font-bold text-center mb-2">Create New Team</h1>
        <p class="text-gray-600 text-center mb-8">Build your team and start managing your players & schedule</p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Team Name</label>
                {{ form.name }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Sport Type</label>
                {{ form.sport_type }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-gray-400">(optional)</span></label>
                {{ form.description }}
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
                Create Team
            </button>
        </form>
    </div>
</div>
{% endblock %}
