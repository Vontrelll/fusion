{% extends 'core/base.html' %}
{% block title %}Create New Team - Fusion{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <!-- Social header -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-100 text-4xl rounded-2xl mb-4">
            🏟️
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Create New Team</h1>
        <p class="text-sm text-zinc-500 mt-1">Build your team and manage players</p>
    </div>

    <div class="bg-white rounded-2xl border border-zinc-200 p-6">

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Team Name</label>
                {{ form.name }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Sport Type</label>
                {{ form.sport_type }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-gray-400">(optional)</span></label>
                {{ form.description }}
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
                Create Team
            </button>
        </form>
    </div>
</div>
{% endblock %}
