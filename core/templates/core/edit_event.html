<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white w-full max-w-md mx-auto rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-[#1877f2] text-white p-4 text-center">
            <h1 class="text-2xl font-semibold">Edit Event</h1>
        </div>

        <div class="p-6">
            <form method="POST">
                {% csrf_token %}

                <div class="space-y-5">
                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Event Name</label>
                        <input type="text" name="name" value="{{ event.name }}" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Start Time</label>
                        <input type="datetime-local" name="start_time" 
                               value="{{ event.start_time|date:'Y-m-d\TH:i' }}" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-1">End Time</label>
                        <input type="datetime-local" name="end_time" 
                               value="{{ event.end_time|date:'Y-m-d\TH:i' }}" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-1">Location</label>
                        <input type="text" name="location" value="{{ event.location }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-1">For which kid?</label>
                        <select name="kid" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-[#1877f2]">
                            {% for kid in kids %}
                                <option value="{{ kid.id }}" 
                                    {% if kid.id == event.kid_attending.id %}selected{% endif %}>
                                    {{ kid.first_name }} {{ kid.last_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit"
                            class="w-full bg-[#1877f2] hover:bg-[#166fe5] text-white font-semibold py-3.5 rounded-lg transition duration-200">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
