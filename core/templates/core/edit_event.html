{% extends 'core/base.html' %}
{% block title %}Edit Event - Fusion{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-8">

    <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
        <div class="bg-[#1877f2] text-white p-6 text-center">
            <h1 class="text-2xl font-semibold">Edit Event</h1>
        </div>
        <div class="p-8">
            <form method="POST">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Event Name</label>
                        <input type="text" name="name" value="{{ event.name }}" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">Start Time</label>
                            <input type="datetime-local" name="start_time"
                                   value="{{ event.start_time|date:'Y-m-d\TH:i' }}" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-medium mb-2">End Time</label>
                            <input type="datetime-local" name="end_time"
                                   value="{{ event.end_time|date:'Y-m-d\TH:i' }}" required
                                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Location</label>
                        <input type="text" name="location" value="{{ event.location }}"
                               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-gray-700 font-medium mb-2">For which kid?</label>
                        <select name="kid" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                            {% for kid in kids %}
                            <option value="{{ kid.id }}"
                                {% if kid.id == event.kid_attending.id %}selected{% endif %}>
                                {{ kid.first_name }} {{ kid.last_name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
