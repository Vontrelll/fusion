{% extends 'core/base.html' %}

{% block title %}Remove Parent - Fusion{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white rounded-2xl border border-zinc-200 p-6">
    <h1 class="text-2xl font-bold tracking-tight text-center mb-1">Remove Parent</h1>
    <p class="text-sm text-zinc-500 text-center mb-6">Are you sure you want to remove this parent from the family?</p>

    <div class="bg-gray-50 rounded-xl p-6 mb-8 text-center">
        <p class="text-lg font-semibold">{{ parent.username }}</p>
        <p class="text-sm text-gray-500">will no longer have access to this family</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3.5 rounded-lg transition">
            Yes, Remove Parent
        </button>
    </form>

    <a href="{% url 'family_list' %}" 
       class="block text-center mt-4 text-gray-600 hover:text-gray-800">
        Cancel
    </a>
</div>

{% endblock %}
