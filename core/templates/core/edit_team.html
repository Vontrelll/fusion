{% extends 'core/base.html' %}
{% block title %}Edit {{ team.name }} - Fusion{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
    <div class="mb-6">
        <a href="{% url 'team_detail' team.id %}" class="text-sm text-blue-600 hover:underline">← Back to Team</a>
    </div>

    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-100 text-4xl rounded-2xl mb-4">
            🏟️
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Edit Team</h1>
        <p class="text-sm text-zinc-500 mt-1">{{ team.name }}</p>
    </div>

    <div class="bg-white rounded-2xl border border-zinc-200 p-6">

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Team Name</label>
                {{ form.name }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Sport Type</label>
                {{ form.sport_type }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-gray-400">(optional)</span></label>
                {{ form.description }}
            </div>

            <div class="flex gap-3">
                <button type="submit" 
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
                    Save Changes
                </button>
                <a href="{% url 'delete_team' team.id %}" 
                   class="flex-1 text-center bg-white border border-red-200 hover:bg-red-50 text-red-600 font-semibold py-4 rounded-2xl transition text-lg">
                    Delete Team
                </a>
            </div>
        </form>
    </div>

    <div class="mt-4 text-center">
        <a href="{% url 'team_list' %}" class="text-sm text-gray-500 hover:text-gray-700">← Back to all teams</a>
    </div>
</div>
{% endblock %}
