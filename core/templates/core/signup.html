<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fusion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center">
    <div class="max-w-lg w-full px-4">
        <!-- Logo (same style as login page) -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="flex items-center">
                    <div class="w-9 h-9 bg-[#1877f2] rounded-2xl flex items-center justify-center">
                        <span class="text-white text-2xl font-bold tracking-tighter">F</span>
                    </div>
                </div>
                <span class="text-3xl font-semibold tracking-tighter text-zinc-900">Fusion</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-zinc-200 shadow-sm p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-semibold tracking-tight text-zinc-900">Create your account</h1>
                <p class="text-zinc-500 mt-2 text-sm">Join Fusion to simplify your schedules</p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- First Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                    <input type="text" name="first_name" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Last Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                    <input type="text" name="last_name" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    {{ form.username }}
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    {{ form.password1 }}
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                    {{ form.password2 }}
                </div>

                <!-- Role Selection -->
                <div class="pt-1">
                    <label class="block text-sm font-medium text-zinc-700 mb-3">I am a...</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center gap-3 p-4 border border-zinc-200 rounded-2xl cursor-pointer hover:border-zinc-300 has-[:checked]:border-[#1877f2] has-[:checked]:bg-blue-50 transition">
                            <input type="radio" name="role" value="parent" class="accent-[#1877f2]" checked>
                            <div>
                                <div class="font-medium">Parent</div>
                                <div class="text-xs text-zinc-500">Manage family &amp; kids</div>
                            </div>
                        </label>
                        <label class="flex items-center gap-3 p-4 border border-zinc-200 rounded-2xl cursor-pointer hover:border-zinc-300 has-[:checked]:border-[#1877f2] has-[:checked]:bg-blue-50 transition">
                            <input type="radio" name="role" value="owner" class="accent-[#1877f2]">
                            <div>
                                <div class="font-medium">Team Owner</div>
                                <div class="text-xs text-zinc-500">Manage teams &amp; organization</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition shadow-md">
                    Create Account
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-8">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-blue-600 hover:underline font-medium">Log in</a>
            </p>
        </div>
    </div>
</body>
</html>
