{% extends 'core/base.html' %}
{% block title %}Password Reset Complete - Fusion{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 px-6">
    <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
        <div class="text-5xl mb-4">✅</div>
        <h1 class="text-2xl font-bold text-gray-900 mb-3">Password reset complete</h1>
        <p class="text-gray-600 mb-6">
            Your password has been set. You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}" 
           class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-2xl transition">
            Log In
        </a>
    </div>
</div>
{% endblock %}
