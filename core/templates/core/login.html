<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fusion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="flex items-center">
                    <div class="w-9 h-9 bg-[#1877f2] rounded-2xl flex items-center justify-center">
                        <span class="text-white text-2xl font-bold tracking-tighter">F</span>
                    </div>
                </div>
                <span class="text-3xl font-semibold tracking-tighter text-zinc-900">Fusion</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl border border-zinc-200 shadow-sm p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-semibold tracking-tight text-zinc-900">Welcome back</h1>
                <p class="text-zinc-500 mt-2">Sign in to continue</p>
            </div>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-2xl mb-6 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-1.5">Username</label>
                    <input type="text" name="username" required
                           class="w-full px-4 py-3.5 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-400 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-700 mb-1.5">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3.5 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-400 text-sm">
                </div>

                <button type="submit"
                        class="w-full bg-zinc-900 hover:bg-black text-white font-semibold py-3.5 rounded-2xl transition text-sm mt-2">
                    Sign In
                </button>
            </form>

            <p class="text-center text-sm text-zinc-500 mt-6">
                Don't have an account? 
                <a href="{% url 'signup' %}" class="text-[#1877f2] hover:underline font-medium">Create one</a>
            </p>
        </div>
</body>
</html>
