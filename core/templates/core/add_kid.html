{% extends 'core/base.html' %}
{% block title %}Add New Kid - Fusion{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">

    <!-- FB/IG style header -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-100 text-4xl rounded-2xl mb-4">
            👦
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Add a New Kid</h1>
        <p class="text-sm text-zinc-500 mt-1">Create a profile for your child</p>
    </div>

    <div class="bg-white rounded-2xl border border-zinc-200 p-6">
        <form method="POST" class="space-y-8">
            {% csrf_token %}

            <!-- First Name -->
            <div>
                <label class="block text-sm font-medium text-zinc-600 mb-2">First Name</label>
                <input type="text" name="first_name" required
                       class="w-full px-5 py-4 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-500 focus:ring-2 focus:ring-zinc-200 transition">
            </div>

            <!-- Last Name -->
            <div>
                <label class="block text-sm font-medium text-zinc-600 mb-2">Last Name</label>
                <input type="text" name="last_name" required
                       class="w-full px-5 py-4 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-500 focus:ring-2 focus:ring-zinc-200 transition">
            </div>

            <!-- Date of Birth -->
            <div>
                <label class="block text-sm font-medium text-zinc-600 mb-2">Date of Birth</label>
                <input type="date" name="date_of_birth" required
                       class="w-full px-5 py-4 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-500 focus:ring-2 focus:ring-zinc-200 transition">
            </div>

            <!-- Gender -->
            <div>
                <label class="block text-sm font-medium text-zinc-600 mb-2">Gender</label>
                <select name="gender" required
                        class="w-full px-5 py-4 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-500 focus:ring-2 focus:ring-zinc-200 transition">
                    <option value="">-- Select Gender --</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>

            <button type="submit"
                    class="w-full bg-zinc-900 hover:bg-black text-white font-semibold py-5 rounded-3xl text-lg transition mt-4">
                + Add Kid
            </button>
        </form>
    </div>

    <!-- Back Link -->
    <div class="text-center mt-8">
        <a href="{% url 'family_list' %}" 
           class="text-zinc-500 hover:text-zinc-700 text-sm flex items-center justify-center gap-2">
            ← Back to My Kids
        </a>
    </div>

</div>
{% endblock %}
