{% extends 'core/base.html' %}
{% block title %}Get Started - Fusion{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-semibold tracking-tight">Welcome, {{ user.first_name }}!</h1>
        <p class="text-zinc-500 mt-2">Let's set up your organization</p>
    </div>

    <div class="bg-white rounded-3xl border border-zinc-200 shadow-sm p-8">
        <form method="POST" action="{% url 'create_organization' %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-zinc-700 mb-1.5">Organization Name</label>
                <input type="text" name="name" required 
                       class="w-full px-4 py-3.5 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-400 text-sm"
                       placeholder="e.g. Apex Athletics">
            </div>

            <div>
                <label class="block text-sm font-medium text-zinc-700 mb-1.5">Description (optional)</label>
                <textarea name="description" rows="3" 
                          class="w-full px-4 py-3 border border-zinc-300 rounded-2xl focus:outline-none focus:border-zinc-400 text-sm"
                          placeholder="Brief description of your organization"></textarea>
            </div>

            <button type="submit" 
                    class="w-full bg-zinc-900 hover:bg-black text-white font-semibold py-3.5 rounded-2xl text-sm transition mt-2">
                Create Organization & Continue
            </button>
        </form>
    </div>
</div>
{% endblock %}
