{% extends 'core/base.html' %}
{% block title %}Create New Family - Fusion{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8 flex justify-center">
  <div class="w-full max-w-md">
    
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl p-10">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl text-4xl mb-4">
          👨‍👩‍👧‍👦
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Create New Family</h1>
        <p class="text-gray-600 mt-2">Create a family group to share schedules with other parents</p>
      </div>

      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Family Name</label>
          <input type="text" name="family_name" required
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition shadow">
          + Create Family
        </button>
      </form>

    </div>

    <!-- Back link -->
    <div class="text-center mt-6">
      <a href="{% url 'family_list' %}" 
         class="text-gray-500 hover:text-gray-700 text-sm flex items-center justify-center gap-2">
        ← Back to My Families
      </a>
    </div>

  </div>
</div>
{% endblock %}
