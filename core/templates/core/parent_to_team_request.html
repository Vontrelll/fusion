{% extends 'core/base.html' %}
{% block title %}Request to Join Team - Fusion{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-12 px-6">
    <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
        <h1 class="text-3xl font-bold mb-6">Request to Join Team</h1>
        
        <p class="text-xl mb-8">
            Do you want to send a join request to <strong>{{ team.name }}</strong>?
        </p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg">
                Yes, Send Request
            </button>
        </form>

        <a href="{% url 'find_teams' %}" 
           class="block mt-6 text-gray-500 hover:text-gray-700">
            ← Cancel
        </a>
    </div>
</div>
{% endblock %}
